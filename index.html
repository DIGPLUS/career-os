<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career OS</title>
<style>
:root{--bg:#0d0f14;--surface:#161922;--surface2:#1e2230;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#e8eaf0;--muted:#6b7280;--accent:#6366f1;--success:#3dd9a4;--warn:#f59e0b;--danger:#ef4444;--radius:10px;--radius-lg:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:14px;line-height:1.6;min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:100}
.main{margin-left:220px;flex:1;padding:32px 36px}
.logo{padding:20px 18px 18px;border-bottom:1px solid var(--border)}
.logo-title{font-size:14px;font-weight:600;letter-spacing:-.2px}
.logo-sub{font-size:11px;color:var(--muted);margin-top:2px}
.nav-section{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:16px 18px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 18px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;border-left:2px solid transparent;transition:all .15s;user-select:none}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(99,102,241,.08)}
.sidebar-footer{margin-top:auto;padding:14px 18px;border-top:1px solid var(--border)}
.ai-dot{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);margin-bottom:10px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.panel{display:none}.panel.active{display:block}
.page-header{margin-bottom:24px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.ph-text h2{font-size:20px;font-weight:600;letter-spacing:-.4px}
.ph-text p{font-size:13px;color:var(--muted);margin-top:3px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px}
.card-label{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:12px;font-weight:500}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:11px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-value{font-size:26px;font-weight:600;letter-spacing:-.5px}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px}
input,textarea,select{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;padding:8px 11px;width:100%;outline:none;transition:border .15s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
.field{margin-bottom:12px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#5254cc}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text);border-color:rgba(255,255,255,.22)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-block{width:100%;justify-content:center}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500}
.tag-blue{background:rgba(99,102,241,.15);color:#a5b4fc}
.tag-green{background:rgba(61,217,164,.12);color:var(--success)}
.tag-warn{background:rgba(245,158,11,.13);color:var(--warn)}
.tag-red{background:rgba(239,68,68,.12);color:var(--danger)}
.tag-gray{background:rgba(255,255,255,.07);color:var(--muted)}
.tag-purple{background:rgba(167,139,250,.13);color:#c4b5fd}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:7px}
.progress-fill{height:100%;border-radius:2px;transition:width .4s}
.list-row{padding:12px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:11px}
.list-row:last-child{border-bottom:none;padding-bottom:0}
.list-row-body{flex:1;min-width:0}
.list-row-title{font-size:13px;font-weight:500}
.list-row-sub{font-size:12px;color:var(--muted);margin-top:2px}
.list-row-actions{display:flex;gap:5px;align-items:center;flex-shrink:0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:24px;width:490px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-head h3{font-size:15px;font-weight:600}
.close-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
.chat-wrap{display:flex;flex-direction:column;height:520px}
.chat-chips{display:flex;flex-wrap:wrap;gap:6px;padding:11px 14px;border-bottom:1px solid var(--border)}
.chip{background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:4px 11px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{color:var(--accent);border-color:var(--accent)}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.msg{max-width:88%}
.msg.user{align-self:flex-end}
.msg-name{font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.bubble{padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.65}
.msg.user .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg.ai .bubble{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;white-space:pre-wrap}
.chat-bottom{border-top:1px solid var(--border);padding:11px 14px;display:flex;gap:9px;align-items:flex-end}
.chat-bottom textarea{flex:1;min-height:40px;max-height:100px;resize:none}
.tdots{display:flex;gap:4px;align-items:center;padding:8px 0}
.tdots span{width:5px;height:5px;background:var(--muted);border-radius:50%;animation:td .8s infinite}
.tdots span:nth-child(2){animation-delay:.15s}
.tdots span:nth-child(3){animation-delay:.3s}
@keyframes td{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.u-critica{color:var(--danger);font-weight:600;font-size:12px}
.u-alta{color:var(--warn);font-weight:600;font-size:12px}
.u-media{color:#60a5fa;font-weight:600;font-size:12px}
.u-baixa{color:var(--success);font-weight:600;font-size:12px}
.trilho-p{background:rgba(167,139,250,.13);color:#c4b5fd;display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.trilho-e{background:rgba(99,102,241,.13);color:#a5b4fc;display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.empty{color:var(--muted);font-size:13px;padding:20px 0;text-align:center}
#toast{position:fixed;bottom:22px;right:22px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 16px;font-size:13px;z-index:999;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
code{font-family:monospace;font-size:11px;background:var(--surface2);padding:1px 5px;border-radius:3px}
a{color:var(--accent);text-decoration:underline}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar">

    <div class="logo-title">Career OS</div>

<!-- MODALS -->
<div class="modal-bg" id="m-proj">

      <div><label>Tecnologias</label><input id="p-tech" placeholder="Delphi, Python..."></div>

<div class="modal-bg" id="m-learn">

    <div class="field"><label>Por que é importante</label><textarea id="l-why" placeholder="Conecte com seus objetivos..."></textarea></div>
    <div class="field-row">

<div class="modal-bg" id="m-goal">

</div>
<div class="modal-bg" id="m-skill">

      <div><label>Nível (1-10)</label><input id="sk-lvl" type="number" min="1" max="10" value="5"></div>

      <button class="btn btn-ghost btn-sm" data-close="m-skill">Cancelar</button>

    </div>
  </div>
</div>

<div id="toast"></div>
<script id="__data__" type="application/json">{}</script>
<script>
(function(){
'use strict';

// ── STATE ──
var D = {
  projects:[], learning:[], goals:[], skills:[], posts:[],
  vision:'',
  chat:[{role:'assistant',content:'Ola! Sou seu AI Advisor de carreira.\n\nConheco seu perfil: administrador principal na empresa do seu pai, construindo o DIGGESTAO em Delphi/VCL, com dois trilhos de presenca digital a construir.\n\nUse os atalhos acima ou me pergunte qualquer coisa sobre carreira, tecnologia, IA ou conteudo.'}]
};

// ── LOAD DATA ──
function loadData(){
  try{
    var el=document.getElementById('__data__');
    if(el){var d=JSON.parse(el.textContent||'{}');applyData(d);}
  }catch(e){}
  if(!D.projects.length){
    try{var b=localStorage.getItem('cos_bak');if(b)applyData(JSON.parse(b));}catch(e){}
  }
}
function applyData(d){
  if(d.projects&&d.projects.length)D.projects=d.projects;
  if(d.learning&&d.learning.length)D.learning=d.learning;
  if(d.goals&&d.goals.length)D.goals=d.goals;
  if(d.skills&&d.skills.length)D.skills=d.skills;
  if(d.posts&&d.posts.length)D.posts=d.posts;
  if(d.vision)D.vision=d.vision;
}

// ── PERSIST ──
function persist(){
  try{localStorage.setItem('cos_bak',JSON.stringify({projects:D.projects,learning:D.learning,goals:D.goals,skills:D.skills,posts:D.posts,vision:D.vision}));}catch(e){}
}

// ── SAVE TO FILE ──
function saveToFile(){
  var payload=JSON.stringify({projects:D.projects,learning:D.learning,goals:D.goals,skills:D.skills,posts:D.posts,vision:D.vision},null,2);
  var html=document.documentElement.outerHTML;
  var tag='script';
  var open='<'+tag+' id="__data__" type="application/json">';
  var close='</'+tag+'>';
  var idx=html.indexOf(open);
  if(idx===-1){toast('Erro ao localizar bloco de dados.');return;}
  var endIdx=html.indexOf(close,idx+open.length);
  var updated=html.substring(0,idx+open.length)+payload+html.substring(endIdx);
  var blob=new Blob([updated],{type:'text/html;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='index.html';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Salvo! Suba o index.html no GitHub para atualizar.');
}

function exportJSON(){
  var blob=new Blob([JSON.stringify({projects:D.projects,learning:D.learning,goals:D.goals,skills:D.skills,posts:D.posts,vision:D.vision},null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='career-os-dados.json';a.click();URL.revokeObjectURL(a.href);
  toast('Dados exportados!');
}
function importJSON(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    var r=new FileReader();
    r.onload=function(ev){try{applyData(JSON.parse(ev.target.result));persist();renderAll();toast('Dados importados!');}catch(ex){toast('Arquivo invalido.');}};
    r.readAsText(e.target.files[0]);
  };inp.click();
}

// ── SEED ──
function seedIfEmpty(){
  if(D.projects.length)return;
  D.projects=[{name:'DIGGESTAO',desc:'Sistema em Delphi/VCL para automatizar rotinas administrativas da empresa.',status:'Em desenvolvimento',priority:'alta',tech:'Delphi / VCL / Object Pascal',deadline:'',createdAt:new Date().toISOString()}];
  D.learning=[
    {name:'Prompt Engineering',why:'Base fundamental para usar IA profissionalmente.',urgency:'critica',status:'Em curso',progress:20},
    {name:'Python basico',why:'Linguagem mais usada em IA e automacao.',urgency:'alta',status:'Na fila',progress:0},
    {name:'APIs REST com Delphi',why:'Integrar DIGGESTAO e DIGPLUS com servicos externos.',urgency:'alta',status:'Na fila',progress:0},
    {name:'Fundamentos de IA / LLMs',why:'Entender LLMs para criar conteudo de autoridade.',urgency:'media',status:'Na fila',progress:0},
    {name:'Estrategia de conteudo digital',why:'Necessario para os dois trilhos de presenca digital.',urgency:'alta',status:'Na fila',progress:0}
  ];
  D.goals=[
    {name:'Lancar perfil no LinkedIn',why:'Primeiro passo para autoridade no trilho pessoal.',deadline:'2025-12-31',category:'Presenca digital',progress:0},
    {name:'Publicar 10 posts no Instagram pessoal',why:'Construir presenca como referencia em IA.',deadline:'2025-12-31',category:'Presenca digital',progress:0},
    {name:'Concluir modulo de cobrancas do DIGGESTAO',why:'Automatizar o processo que mais consome tempo.',deadline:'2025-12-31',category:'Produto',progress:15},
    {name:'Dominar APIs REST no Delphi',why:'Habilidade tecnica critica para o DIGGESTAO.',deadline:'2025-12-31',category:'Tecnica',progress:5}
  ];
  D.skills=[
    {name:'Delphi / VCL',level:5,category:'Linguagem'},{name:'Object Pascal',level:5,category:'Linguagem'},
    {name:'SQL / Banco de dados',level:6,category:'Banco de dados'},{name:'Gestao administrativa',level:9,category:'Gestao'},
    {name:'Gestao financeira',level:8,category:'Gestao'},{name:'Vendas B2B',level:7,category:'Vendas'},
    {name:'Suporte tecnico',level:7,category:'Ferramenta'},{name:'Prompt Engineering',level:4,category:'IA / Machine Learning'}
  ];
  D.vision='Ser referencia em tecnologia e IA no mercado brasileiro, unindo visao de negocios com solucoes tecnicas reais. Em paralelo, escalar o DIGPLUS.';
  persist();
}

// ── NAVIGATION ──
function nav(id){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  var panel=document.getElementById('panel-'+id);
  if(panel)panel.classList.add('active');
  var navEl=document.querySelector('[data-panel="'+id+'"]');
  if(navEl)navEl.classList.add('active');
  renderPanel(id);
}

function renderAll(){
  var active=document.querySelector('.panel.active');
  var id=active?active.id.replace('panel-',''):'dashboard';
  renderPanel(id);
  renderQueue();
}

function renderPanel(id){
  if(id==='dashboard')renderDash();
  else if(id==='hoje')renderHoje();
  else if(id==='advisor')renderAdvisor();
  else if(id==='projects')renderProjects();
  else if(id==='learning')renderLearning();
  else if(id==='goals')renderGoals();

// ── UTILS ──
function esc(s){
  var r=String(s||'');
  r=r.split('&').join('&amp;');
  r=r.split('<').join('&lt;');
  r=r.split('>').join('&gt;');
  return r;
}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
function el(id){return document.getElementById(id);}
function set(id,html){var e=el(id);if(e)e.innerHTML=html;}

function makeTag(cls,text){return '<span class="tag '+cls+'">'+esc(text)+'</span>';}
function progressBar(pct,color){return '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:'+color+'"></div></div>';}
function prioColor(p){return p==='alta'?'tag-red':p==='media'?'tag-warn':'tag-green';}
function progColor(p){return p>=80?'var(--success)':p>=40?'var(--accent)':'var(--warn)';}
function urgClass(u){return {critica:'u-critica',alta:'u-alta',media:'u-media',baixa:'u-baixa'}[u]||'';}
function urgLabel(u){return {critica:'Critica',alta:'Alta',media:'Media',baixa:'Baixa'}[u]||u;}
function fmtDate(s){if(!s)return'';try{return new Date(s+'T12:00:00').toLocaleDateString('pt-BR');}catch(e){return s;}}

async function callAPI(system, userMsg){
  var r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:system,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:userMsg}]})
  });
  var d=await r.json();
  return (d.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('\n')||'Nao consegui processar.';
}

function copyTxt(t){
  navigator.clipboard.writeText(t).then(function(){toast('Copiado!');}).catch(function(){
    var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('Copiado!');
  });
}

// ── CHAT ──
var chatHistory=[{role:'assistant',content:'Ola! Sou seu AI Advisor de carreira. Conheco seu perfil e posso te ajudar com tendencias, cursos, posts, proximos passos e muito mais. Use os atalhos acima ou me pergunte qualquer coisa.'}];

function appendMsg(role,text,scroll){
  var msgs=el('chat-msgs');if(!msgs)return;
  var div=document.createElement('div');
  div.className='msg '+(role==='ai'?'ai':'user');
  var nameHtml=role==='ai'?'<div class="msg-name">Career Advisor</div>':'';
  div.innerHTML=nameHtml+'<div class="bubble">'+esc(text)+'</div>';
  msgs.appendChild(div);
  if(scroll!==false)msgs.scrollTop=msgs.scrollHeight;
}

function showTyping(){
  var msgs=el('chat-msgs');if(!msgs)return;
  var div=document.createElement('div');
  div.className='msg ai';div.id='typing-ind';
  div.innerHTML='<div class="msg-name">Career Advisor</div><div class="bubble"><div class="tdots"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping(){var t=el('typing-ind');if(t)t.remove();}

async function sendMsg(){
  var inp=el('chat-in');if(!inp)return;
  var msg=inp.value.trim();if(!msg)return;
  inp.value='';
  appendMsg('user',msg);
  D.chat.push({role:'user',content:msg});
  showTyping();
  if(IS_LOCAL){
    hideTyping();
    appendMsg('ai','Abrindo Claude.ai com seu contexto e pergunta...');
    openClaude(ctxResume()+msg);
    return;
  }
  try{
    var msgs=D.chat.map(function(m){return {role:m.role==='ai'?'assistant':m.role,content:m.content};});
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sysPrompt(),tools:[{type:'web_search_20250305',name:'web_search'}],messages:msgs})
    });
    var d=await r.json();
    var reply=(d.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('\n')||'Nao consegui processar.';
    hideTyping();
    appendMsg('ai',reply);
    D.chat.push({role:'assistant',content:reply});
    if(D.chat.length>24)D.chat=D.chat.slice(-24);
  }catch(e){
    hideTyping();
    appendMsg('ai','Erro de conexao. Verifique e tente novamente.');
  }
}

function sendChip(t){var inp=el('chat-in');if(inp)inp.value=t;sendMsg();}
